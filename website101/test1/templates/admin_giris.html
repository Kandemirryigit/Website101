<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏪</text></svg>">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Girişi</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Karla:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: 'Karla', sans-serif; background: #1b4332; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .kart { background: white; padding: 3rem 2.5rem; border-radius: 16px; width: 360px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); text-align: center; }
  .kart h1 { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; letter-spacing: 3px; color: #2d6a4f; margin-bottom: 0.5rem; }
  .kart p { color: #888; font-size: 0.9rem; margin-bottom: 2rem; }
  input[type="password"] { width: 100%; padding: 0.9rem 1rem; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 1rem; font-family: 'Karla', sans-serif; transition: border 0.2s; margin-bottom: 1rem; }
  input[type="password"]:focus { outline: none; border-color: #52b788; }
  button { width: 100%; padding: 1rem; background: #2d6a4f; color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: 700; font-family: 'Karla', sans-serif; cursor: pointer; }
  button:hover { background: #1b4332; }
  .hata { background: #ffeaea; color: #c00; padding: 0.8rem; border-radius: 8px; margin-bottom: 1rem; font-size: 0.9rem; }
  .geri { display: block; margin-top: 1.2rem; color: #888; text-decoration: none; font-size: 0.9rem; }
  .geri:hover { color: #2d6a4f; }
</style>
</head>
<body>
<div class="kart">
  <h1>🔐 Admin</h1>
  <p>Yönetim paneline giriş yapın</p>
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
      <div class="hata">{{ msg }}</div>
    {% endfor %}
  {% endwith %}
  <form method="POST">
    <input type="password" name="sifre" placeholder="Şifre" autofocus required>
    <button type="submit">Giriş Yap</button>
  </form>
  <a href="/" class="geri">← Ana sayfaya dön</a>
</div>
</body>
</html>
